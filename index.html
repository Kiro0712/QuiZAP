<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QuiZAP</title>
  <style>
    :root{--bg:#0b1020;--card:#121a33;--muted:#a9b3d6;--text:#eef2ff;--accent:#7aa2ff;--good:#34d399;--bad:#fb7185;--warn:#fbbf24;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;background:linear-gradient(180deg,#0b1020,#070a14);color:var(--text);}
    header{padding:18px 16px;position:sticky;top:0;background:rgba(11,16,32,.75);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);z-index:10}
    h1{margin:0;font-size:18px;letter-spacing:.02em}
    .wrap{max-width:980px;margin:0 auto;padding:16px}
    .grid{display:grid;gap:12px}
    @media(min-width:900px){.grid{grid-template-columns:360px 1fr}}
    .card{background:rgba(18,26,51,.9);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.25)}

    /* 右側カードを縦レイアウトにしてボタンを下固定 */
    .card.flexcol{display:flex;flex-direction:column;}
    .bottomBar{margin-top:auto;padding-top:12px;background:linear-gradient(to top, rgba(18,26,51,1), rgba(18,26,51,.95) 60%, rgba(18,26,51,0));position:sticky;bottom:0;}

    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    select,input,button,textarea{font:inherit}
    select,input,textarea{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(7,10,20,.8);color:var(--text);outline:none}

    /* 出題科目ドロップダウン内の文字を太字 */
    #subjectSel{font-weight:700;}
    #subjectSel option{font-weight:700;}

    textarea{min-height:120px;resize:vertical}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row > *{flex:1}
    button{padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(122,162,255,.18);color:var(--text);cursor:pointer}
    button:hover{background:rgba(122,162,255,.28)}
    button.primary{background:rgba(122,162,255,.35)}
    button.good{background:rgba(52,211,153,.18)}
    button.bad{background:rgba(251,113,133,.18)}
    button.warn{background:rgba(251,191,36,.16)}
    .pill{display:inline-flex;gap:8px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);font-size:12px;color:var(--muted)}

    .q{font-size:18px;line-height:1.5;margin:6px 0 10px}
    .qImageWrap{display:none;margin:0 0 10px}
    .qImage{
      display:block;
      width:100%;
      max-height:280px;
      object-fit:contain;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.03);
    }
    .qHintWrap{display:none;margin:0 0 10px}
    .qHintDetails{
      border:1px solid rgba(251,191,36,.3);
      background:rgba(251,191,36,.08);
      border-radius:12px;
      padding:8px 10px;
    }
    .qHintDetails summary{
      cursor:pointer;
      color:#fde68a;
      font-size:13px;
      font-weight:700;
      user-select:none;
    }
    .qHintBody{margin-top:8px;color:#fef3c7;font-size:13px;line-height:1.5}

    /* 選択肢行（ア：/イ：/ウ：...）を小さく＆間隔を詰める */
    .choiceLine{font-size:0.75em;display:block;margin:0;line-height:1.1}

    .a{padding:10px 12px;border-radius:12px;border:1px dashed rgba(255,255,255,.18);background:rgba(255,255,255,.04)}
    .muted{color:var(--muted)}
    .ok{color:var(--good)}
    .ng{color:var(--bad)}
    .small{font-size:12px}
    .orderArea{display:none;margin-top:10px}
    .orderBox{
      min-height:44px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      padding:8px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.03);
    }
    .orderPlaceholder{font-size:12px;color:var(--muted)}
    .tokenBank{margin-top:8px}
    .tokenBtn{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(122,162,255,.16);
      color:var(--text);
      cursor:pointer;
      font-size:13px;
      line-height:1.2;
    }
    .tokenBtn.answer{background:rgba(52,211,153,.16)}

    /* 難易度表示は白色にする */
    #diffLine{color:var(--text);}

    .sep{height:1px;background:rgba(255,255,255,.08);margin:12px 0}
    .list{max-height:300px;overflow:auto;padding-right:6px}
    .item{padding:10px 10px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);margin-bottom:8px;cursor:pointer}
    .item:hover{background:rgba(255,255,255,.06)}
    .item b{display:block}
    .statNum{font-size:1.5em;font-weight:600;}

    /* ===== モバイル時の左パネル折りたたみ ===== */
    .controlPanelSummary{
      display:none;
      list-style:none;
      cursor:pointer;
      user-select:none;
      font-weight:700;
      line-height:1.2;
    }
    .controlPanelSummary::-webkit-details-marker{display:none}
    .controlPanelSummary::after{content:"▼"; font-size:12px; color:var(--muted)}
    .controlPanel:not([open]) .controlPanelSummary::after{content:"▶"}

    @media(max-width:899px){
      .controlPanel{padding:0}
      .controlPanelSummary{
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:12px 14px;
      }
      .controlPanel[open] .controlPanelSummary{
        border-bottom:1px solid rgba(255,255,255,.08);
      }
      .controlPanelBody{padding:12px 14px 14px}
      .controlPanel:not([open]) .controlPanelBody{display:none}
    }
    @media(min-width:900px){
      .controlPanel > .controlPanelBody{
        display:block !important;
        padding:0;
      }
    }
  

    /* ===== 初回：出題科目選択モーダル ===== */
    .modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:9999;padding:18px}
    .modal{width:min(520px,100%);background:rgba(18,26,51,.96);border:1px solid rgba(255,255,255,.10);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.45);padding:16px}
    .modal h2{margin:0 0 10px;font-size:16px;letter-spacing:.02em}
    .modal .modalList{display:grid;gap:10px;margin-top:10px}
    .modalBtn{width:100%;text-align:left;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(122,162,255,.18);color:var(--text);cursor:pointer;font-weight:700}
    .modalBtn:hover{background:rgba(122,162,255,.28)}
    .modalBtn[disabled]{opacity:.45;cursor:not-allowed}
    .modalNote{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.5}
    
    /* ===== モーダルのグループ表示 ===== */
    .modalList.grouped{
      display:grid;
      gap:12px;
      margin-top:10px;
    }
    .modalSection{
      border:1px solid rgba(255,255,255,.10);
      border-radius:14px;
      background:rgba(255,255,255,.04);
      overflow:hidden;
    }
    .modalSectionTitle{
      padding:12px 14px;
      font-weight:700;
      font-size:14px;
      color:var(--text);
      background:rgba(255,255,255,.03);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .modalSectionBody{
      display:grid;
      gap:10px;
      padding:12px;
    }
    .modalSection summary{
      list-style:none;
      cursor:pointer;
      user-select:none;
    }
    .modalSection summary::-webkit-details-marker{
      display:none;
    }
    .modalSection summary.collapsible{
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .modalSection summary.collapsible::after{
      content:"▼";
      font-size:12px;
      color:var(--muted);
    }
    .modalSection:not([open]) summary.collapsible::after{
      content:"▶";
    }
    .modalSection:not([open]) .modalSectionBody{
      display:none;
    }
  </style>
</head>
<body>
<header>
  <div class="wrap row" style="align-items:center;justify-content:center">
    <h1>QuiZAP</h1>
  </div>
</header>

<!-- 初回：出題科目選択 -->
<div class="modalOverlay" id="subjectModal" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="subjectModalTitle">
    <h2 id="subjectModalTitle">出題科目・テストを選択してください</h2>

    <div class="modalList grouped">
      <div class="modalList grouped">
        <details class="modalSection" id="finalTestGroup" open>
          <summary class="modalSectionTitle collapsible">学年末テスト</summary>
          <div class="modalSectionBody">
            <button class="modalBtn" data-subject="公共">→　公共</button>
      			<button class="modalBtn" data-subject="保健">→　保健</button>
      			<button class="modalBtn" data-subject="論理・表現Ⅰ">→　論理・表現Ⅰ</button>
      			<button class="modalBtn" data-subject="生物基礎">→　生物基礎</button>
      			<button class="modalBtn" data-subject="ＥＣⅠ">→　ＥＣⅠ</button>
      			<button class="modalBtn" data-subject="数学Ⅰ">→　数学Ⅰ</button>
      			<button class="modalBtn" data-subject="物理基礎">→　物理基礎</button>
    			</div>
  			</details>

  			<details class="modalSection" id="morningTestGroup">
    			<summary class="modalSectionTitle collapsible">朝学習テスト</summary>
    			<div class="modalSectionBody">
     				<button class="modalBtn" data-subject="朝学習テスト⑧">→　朝学習テスト⑧</button>
      			<button class="modalBtn" data-subject="朝学習テスト⑨" disabled>→　朝学習テスト⑨</button>
      			<button class="modalBtn" data-subject="朝学習テスト⑩" disabled>→　朝学習テスト⑩</button>
    			</div>
  			</details>
			</div>
    <div class="modalNote">※科目・テストを選ぶと問題が始まります。</div>
  </div>
</div>

<div class="wrap grid">
  <details class="card controlPanel" open>
    <summary class="controlPanelSummary">設定・検索（タップで開閉）</summary>
    <div class="controlPanelBody">
    <div>
      <label style="font-weight:700;">出題科目・テスト</label>
      <select id="subjectSel">
        <option value="公共">公共</option>
        <option value="保健">保健</option>
        <option value="論理・表現Ⅰ">論理・表現Ⅰ</option>
        <option value="生物基礎">生物基礎</option>
        <option value="ＥＣⅠ">ＥＣⅠ</option>
        <option value="数学Ⅰ">数学Ⅰ</option>
        <option value="物理基礎">物理基礎</option>
        <option value="朝学習テスト⑧">朝学習テスト⑧</option>
        <option value="朝学習テスト⑨" disabled>朝学習テスト⑨</option>
        <option value="朝学習テスト⑩" disabled>朝学習テスト⑩</option>
      </select>
    </div>

    <div style="margin-top:10px">
      <label>出題モード</label>
      <select id="modeSel">
        <option value="flash">暗記カード（答え表示中心）</option>
        <option value="input">入力クイズ（正誤判定）</option>
      </select>
    </div>

    <div style="margin-top:10px">
      <label>出題する章</label>
      <select id="sectionSel"></select>
    </div>

    <div class="sep"></div>

    <label>検索</label>
    <div class="row">
      <input id="searchBox" placeholder="例：プラザ / 公害 / NATO など" />
    </div>
    <div class="list" id="searchList" style="margin-top:10px"></div>

    <div class="sep"></div>

    <div class="row" style="margin-top:10px">
      <button id="btnSaveStats" class="bad">進捗セーブ</button>
      <button id="btnResetStats">進捗リセット</button>
    </div>
    </div>
  </details>

  <section class="card flexcol">
    <div class="pill" id="metaPill">—</div>

    <!-- 統計を問題の上へ移動（入力クイズのみ表示） -->
    <div class="sep" id="sepStatsTop"></div>
    <div class="row" id="statsRow">
      <div class="pill"><span id="statSummary"><span class="statNum">0</span>問目、<span class="statNum">0</span>問正解！（<span class="statNum">0</span>％）</span></div>
    </div>
    <div class="sep" id="sepStatsBottom"></div>

    <div class="q" id="qText">章を選んで「次の問題」</div>
    <div id="qImageWrap" class="qImageWrap">
      <img id="qImage" class="qImage" alt="問題画像" />
    </div>
    <div class="small muted" id="diffLine"></div>
    <div id="qHintWrap" class="qHintWrap"></div>

    <div id="inputArea" style="display:none">
      <label>あなたの答え（例：プラザ合意）</label>
      <input id="ansInput" autocomplete="off" placeholder="ここに入力" />
      <div id="orderArea" class="orderArea">
        <div class="small muted">語句をタップして並び替えてください（上段をタップで取り消します）。</div>
        <div id="orderAnswerBox" class="orderBox" style="margin-top:6px"></div>
        <div id="orderBankBox" class="orderBox tokenBank"></div>
        <div class="row" style="margin-top:8px">
          <button id="btnOrderBack" type="button" class="warn">1語戻す</button>
          <button id="btnOrderClear" type="button">すべて戻す</button>
        </div>
      </div>
      <div class="row" style="margin-top:10px">
        <button id="btnJudge" class="primary">正誤判定</button>
        <button id="btnGiveUp" class="bad">わからない</button>
      </div>
      <p class="small muted">一部問題や文章で答える問題には別解があります。文章で答える問題の場合、正しい答えを入力しても正解とならない場合があります。</p>
    </div>

    <!-- 暗記カード用：問題の下に表示する答えボタン -->
    <div id="flashShowWrap" style="margin-top:10px">
      <button id="btnShow">▼ 答えを表示</button>
    </div>

    <!-- 答えはボタンの下に表示 -->
    <div style="margin-top:10px;display:none" id="answerBox" class="a"></div>

    <div style="margin-top:10px" class="small muted" id="hintLine"></div>

    <!-- 下固定ボタンエリア -->
    <div class="bottomBar">
      <div class="row" style="margin-top:10px">
        <button id="btnPrev">← 前の問題</button>
        <button id="btnReviewMistakes" class="bad">復習する →</button>
        <button class="primary" id="btnNext">次の問題 →</button>
      </div>
    </div>
  </section>
</div>

<script>
  (async function loadScriptsNoCache(){
    const v = Date.now().toString();
    const files = [
      "data/public.js",
      "data/health.js",
      "data/logic.js",
      "data/bio.js",
      "data/ec1.js",
      "data/math1.js",
      "data/physics_basic.js",
      "data/week_test8.js",
      "js/app.js",
    ];

    for(const file of files){
      await new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = `${file}?v=${v}`;
        s.onload = resolve;
        s.onerror = () => reject(new Error(`Failed to load: ${file}`));
        document.body.appendChild(s);
      });
    }
  })().catch((err) => {
    console.error(err);
  });

  const finalTestGroup = document.getElementById("finalTestGroup");
  const morningTestGroup = document.getElementById("morningTestGroup");

  if(finalTestGroup && morningTestGroup){
    finalTestGroup.addEventListener("toggle", () => {
      if(finalTestGroup.open){
        morningTestGroup.open = false;
      }
    });

    morningTestGroup.addEventListener("toggle", () => {
      if(morningTestGroup.open){
        finalTestGroup.open = false;
      }
    });
  }
</script>
</body>
</html>
