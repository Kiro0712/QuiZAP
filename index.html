<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QuiZAP</title>
  <style>
    :root{--bg:#0b1020;--card:#121a33;--muted:#a9b3d6;--text:#eef2ff;--accent:#7aa2ff;--good:#34d399;--bad:#fb7185;--warn:#fbbf24;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;background:linear-gradient(180deg,#0b1020,#070a14);color:var(--text);}
    header{padding:18px 16px;position:sticky;top:0;background:rgba(11,16,32,.75);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);z-index:10}
    h1{margin:0;font-size:18px;letter-spacing:.02em}
    .wrap{max-width:980px;margin:0 auto;padding:16px}
    .grid{display:grid;gap:12px}
    @media(min-width:900px){.grid{grid-template-columns:360px 1fr}}
    .card{background:rgba(18,26,51,.9);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    /* 右側カードを縦レイアウトにしてボタンを下固定 */
    .card.flexcol{display:flex;flex-direction:column;}
    .bottomBar{margin-top:auto;padding-top:12px;background:linear-gradient(to top, rgba(18,26,51,1), rgba(18,26,51,.95) 60%, rgba(18,26,51,0));position:sticky;bottom:0;}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    select,input,button,textarea{font:inherit}
    select,input,textarea{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(7,10,20,.8);color:var(--text);outline:none}
    textarea{min-height:120px;resize:vertical}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row > *{flex:1}
    button{padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(122,162,255,.18);color:var(--text);cursor:pointer}
    button:hover{background:rgba(122,162,255,.28)}
    button.primary{background:rgba(122,162,255,.35)}
    button.good{background:rgba(52,211,153,.18)}
    button.bad{background:rgba(251,113,133,.18)}
    button.warn{background:rgba(251,191,36,.16)}
    .pill{display:inline-flex;gap:8px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);font-size:12px;color:var(--muted)}
    .q{font-size:18px;line-height:1.5;margin:6px 0 10px}
    .a{padding:10px 12px;border-radius:12px;border:1px dashed rgba(255,255,255,.18);background:rgba(255,255,255,.04)}
    .muted{color:var(--muted)}
    .ok{color:var(--good)}
    .ng{color:var(--bad)}
    .small{font-size:12px}
    .sep{height:1px;background:rgba(255,255,255,.08);margin:12px 0}
    .list{max-height:300px;overflow:auto;padding-right:6px}
    .item{padding:10px 10px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);margin-bottom:8px;cursor:pointer}
    .item:hover{background:rgba(255,255,255,.06)}
    .item b{display:block}
    .kbd{font-size:11px;border:1px solid rgba(255,255,255,.2);padding:2px 6px;border-radius:6px;background:rgba(255,255,255,.06);color:var(--muted)}
    .statNum{font-size:1.5em;font-weight:600;}
  </style>
</head>
<body>
<header>
  <div class="wrap row" style="align-items:center;justify-content:space-between">
    <h1>QuiZAP</h1>
    
  </div>
</header>

<div class="wrap grid">
  <section class="card">
    <div>
      <label>出題科目</label>
      <select id="subjectSel">
        <option value="公共">公共</option>
        <option value="保健" disabled>保健（Coming Soon）</option>
      </select>
    </div>

    <div style="margin-top:10px">
      <label>出題モード</label>
      <select id="modeSel">
        <option value="flash">暗記カード（答え表示中心）</option>
        <option value="input">入力クイズ（正誤判定）</option>
      </select>
    </div>

    <div style="margin-top:10px">
      <label>出題する章</label>
      <select id="sectionSel"></select>
    </div>
    <div class="sep"></div>
    <label>検索</label>
    <div class="row">
      <select id="searchTarget">
        <option value="q">問題（問題文）</option>
        <option value="a">答え</option>
        <option value="both">問題＋答え</option>
      </select>
      <input id="searchBox" placeholder="例：プラザ / 公害 / NATO など" />
    </div>
    <div class="list" id="searchList" style="margin-top:10px"></div>

    <div class="sep"></div>

    <details>
      <summary class="muted">答えデータの編集（JSON）</summary>
      <p class="small muted">このJSONを編集→「反映」すると問題・答えを自由に追加/修正できます。※オンライン上では更新されないため、もし問題や答えの間違いを発見した際は、クラスLINEにご報告をお願いします。</p>
      <textarea id="dataArea"></textarea>
      <div class="row" style="margin-top:10px">
        <button id="btnApplyData" class="good">反映</button>
        <button id="btnExportData">JSONをコピー</button>
      </div>
      <p class="small muted">※入力を間違えて戻せなくなった際は、ページ再読み込みで元に戻せます（保存済みの進捗は残ります）。</p>
    </details>

    <div class="row" style="margin-top:10px">
      <button id="btnResetStats">進捗リセット</button>
    </div>
  </section>

  <section class="card flexcol">
    <div class="pill" id="metaPill">—</div>

    <!-- 統計を問題の上へ移動 -->
    <div class="sep" id="sepStatsTop"></div>
    <div class="row" id="statsRow">
      <div class="pill"><span id="statSummary"><span class="statNum">0</span>問目、<span class="statNum">0</span>問正解！（<span class="statNum">0</span>％）</span></div>
    </div>
    <div class="sep" id="sepStatsBottom"></div>

    <div class="q" id="qText">章を選んで「次の問題」</div>

    <div id="inputArea" style="display:none">
      <label>あなたの答え（例：プラザ合意）</label>
      <input id="ansInput" autocomplete="off" placeholder="ここに入力" />
      <div class="row" style="margin-top:10px">
        <button id="btnJudge" class="primary">判定</button>
        <button id="btnGiveUp" class="bad">わからない</button>
      </div>
      <p class="small muted">同義語は「別解」にあります。</p>
    </div>

    <!-- 暗記カード用：問題の下に表示する答えボタン -->
    <div id="flashShowWrap" style="margin-top:10px">
      <button id="btnShow">▼ 答えを表示</button>
    </div>

    <!-- 答えはボタンの下に表示 -->
    <div style="margin-top:10px;display:none" id="answerBox" class="a"></div>

    <div style="margin-top:10px" class="small muted" id="hintLine"></div>

    <!-- 下固定ボタンエリア -->
    <div class="bottomBar">
      <div class="row" style="margin-top:10px">
      <button id="btnPrev">← 前の問題</button>
      <button id="btnReviewMistakes" class="bad">復習する →</button>
      <button class="primary" id="btnNext">次の問題 →</button>
      
      </div>
    </div>
  </section>
</div>

/* =========================
   2) アプリ本体
   ========================= */
const LS_KEY = "koukyou_quiz_v1";
// 問題データをHTML側で更新しても、localStorageに古いdataが残っていると反映されないため
// 版（バージョン）を持たせて不一致ならDEFAULT_DATAを採用する
const DATA_VERSION = 2;

const state = {
  data: null,
  section: null,
  mode: "flash",
  order: [],
  idx: -1,
  current: null,
  revealed: false,
  stats: {seen:0, ok:0, ng:0, streak:0},
  mistakes: new Set(), // question id
  reviewMode: false
};

const el = (id)=>document.getElementById(id);

function normalize(s){
  return (s??"")
    .toString()
    .trim()
    .replace(/\s+/g,"")
    .replace(/[‐-‒–—―ー]/g,"-")
    .replace(/[・]/g,"･")
    .replace(/[（）()]/g,"");
}

function qid(section, i){ return section + "::" + i; }

// ★ 修正：章セレクトを組み立てる関数（未定義エラーの原因）
function buildSectionOptions(){
  const sel = el("sectionSel");
  if(!sel) return;
  sel.innerHTML = "";

  // ★ 全章オプションを先頭に追加
  const allOpt = document.createElement("option");
  allOpt.value = "__ALL__";
  allOpt.textContent = "全章";
  sel.appendChild(allOpt);

  const keys = Object.keys(state.data || {});
  keys.forEach(name=>{
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });

  if(state.section === "__ALL__"){
    sel.value = "__ALL__";
  }else if(keys.includes(state.section)){
    sel.value = state.section;
  }else{
    state.section = "__ALL__";
    sel.value = "__ALL__";
  }
}

function makeOrder(fromMistakes=false){
  let pool = [];

  if(state.section === "__ALL__"){
    Object.keys(state.data).forEach(sec=>{
      (state.data[sec] || []).forEach((_,i)=>{
        pool.push({section:sec, index:i});
      });
    });
  }else{
    (state.data[state.section] || []).forEach((_,i)=>{
      pool.push({section:state.section, index:i});
    });
  }

  if(fromMistakes){
    pool = pool.filter(p=> state.mistakes.has(qid(p.section,p.index)));
  }

  for(let i=pool.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }

  state.order = pool;
  state.idx = -1;
  updateNavButtons();
}

function currentItem(){
  const entry = state.order[state.idx];
  if(!entry) return null;

  const items = state.data[entry.section] || [];
  const it = items[entry.index];
  if(!it) return null;

  return { ...it, _i:entry.index, _section:entry.section, _id: qid(entry.section,entry.index) };
}

function updateNavButtons(){
  const btnPrev = el("btnPrev");
  const btnNext = el("btnNext");
  const btnReview = el("btnReviewMistakes");

  const total = state.order.length;
  const atStart = state.idx <= 0;
  const atEnd = total === 0 ? true : state.idx >= total - 1;

  if(btnPrev) btnPrev.style.display = atStart ? "none" : "inline-block";
  if(btnNext) btnNext.style.display = atEnd ? "none" : "inline-block";

  // ★ 入力クイズ時のみ、最後の問題でだけ「復習」を表示
  if(btnReview){
    if(state.mode === "input" && atEnd && total > 0){
      btnReview.style.display = "inline-block";
    }else if(state.mode === "input"){
      btnReview.style.display = "none";
    }
    // flashモード時の表示制御はsetModeUI側に任せる
  }
}

function setModeUI(){
  const isInput = state.mode === "input";

  // 入力モード以外（暗記カード）のときは統計を非表示
  const statsRow = el("statsRow");
  const sepTop = el("sepStatsTop");
  const sepBottom = el("sepStatsBottom");

  if(statsRow){
    const show = isInput;
    statsRow.style.display = show ? "flex" : "none";
    if(sepTop) sepTop.style.display = show ? "block" : "none";
    if(sepBottom) sepBottom.style.display = show ? "block" : "none";
  }

  // ★ モードごとのボタン表示制御
  const btnShow = el("btnShow");
  const btnReview = el("btnReviewMistakes");
  const btnReset = el("btnResetStats");

  if(state.mode === "flash"){
    // 暗記カード時
    if(btnShow) btnShow.style.display = "inline-block";
    if(btnReview) btnReview.style.display = "none";
    if(btnReset) btnReset.style.display = "none";
  }else{
    // 入力クイズ時
    if(btnShow) btnShow.style.display = "none"; // ★ 追加：入力時は答えを表示を非表示
    if(btnReset) btnReset.style.display = "inline-block";
    // 復習ボタンは updateNavButtons で制御
  }

  el("inputArea").style.display = isInput ? "block" : "none";
  el("ansInput").value = "";
  el("hintLine").textContent = isInput
    ? "Enterでも判定します / わからなければ「わからない」をクリック・タップ"
    : "";
}

function showAnswer(){
  if(!state.current) return;
  state.revealed = true;
  el("answerBox").style.display = "block";
  el("answerBox").innerHTML =
    `<div class="muted small">答え</div>
     <div style="font-size:18px;margin-top:4px"><b>${state.current.a[0]}</b></div>
     ${state.current.a.length>1 ? `<div class="muted small" style="margin-top:6px">別解：${state.current.a.slice(1).join(" / ")}</div>` : ""}`;
}

function hideAnswer(){
  state.revealed = false;
  el("answerBox").style.display = "none";
  el("answerBox").textContent = "";
}

function nextQuestion(){
  const items = state.section === "__ALL__" ? state.order.map(e=>state.data[e.section][e.index]) : (state.data[state.section] || []);
  if(items.length === 0){
    el("qText").textContent = "この章に問題がありません。";
    const label0 = state.section === "__ALL__" ? "全章" : state.section;
    el("metaPill").textContent = `前に選択中：${label0} - 0 / 0${state.reviewMode ? "（間違い復習）" : ""}`;
    hideAnswer();
    setModeUI();
    // ナビボタンは両方隠す
    state.idx = 0;
    updateNavButtons();
    return;
  }

  // ★ 末尾では自動でシャッフルして最初に戻らない（末尾で「次の問題」を非表示）
  if(state.idx < state.order.length - 1){
    state.idx += 1;
  }else{
    state.idx = state.order.length - 1;
  }

  state.current = currentItem();
  state.revealed = false;
  hideAnswer();
  setModeUI();

  const total = state.order.length;
  const pos = state.idx + 1;
  const label = state.section === "__ALL__" ? "全章" : state.section;
  el("metaPill").textContent = `選択中：${label} - ${pos} / ${total}${state.reviewMode ? "（間違い復習）" : ""}`;
  el("qText").textContent = state.current.q;
  el("ansInput").focus();

  updateNavButtons();
}

function prevQuestion(){
  if(state.order.length === 0) return;
  if(state.idx <= 0){
    state.idx = 0;
  }else{
    state.idx -= 1;
  }
  state.current = currentItem();
  state.revealed = false;
  hideAnswer();
  setModeUI();

  const total = state.order.length;
  const pos = state.idx + 1;
  const label = state.section === "__ALL__" ? "全章" : state.section;
  el("metaPill").textContent = `選択中：${label} - ${pos} / ${total}${state.reviewMode ? "（間違い復習）" : ""}`;
  el("qText").textContent = state.current.q;

  updateNavButtons();
}

function judge(){
  if(!state.current) return;
  const user = normalize(el("ansInput").value);
  const answers = state.current.a.map(normalize);
  const ok = answers.includes(user);

  state.stats.seen += 1;
  if(ok){
    state.stats.ok += 1;
    state.stats.streak += 1;
    state.mistakes.delete(state.current._id);
    el("hintLine").innerHTML = `<span class="ok"><b>○ 正解！</b></span>　次へどうぞ。`;
  }else{
    state.stats.ng += 1;
    state.stats.streak = 0;
    state.mistakes.add(state.current._id);
    el("hintLine").innerHTML = `<span class="ng"><b>× ちがう</b></span>　答えを表示します。`;
    showAnswer();
  }
  renderStats();
  save();
}

function giveUp(){
  if(!state.current) return;
  state.stats.seen += 1;
  state.stats.ng += 1;
  state.stats.streak = 0;
  state.mistakes.add(state.current._id);
  renderStats();
  showAnswer();
  el("hintLine").innerHTML = `<span class="ng"><b>×</b></span>　復習リストに入れました。`;
  save();
}

function renderStats(){
  const {seen, ok} = state.stats;
  const rate = seen ? Math.round(ok/seen*100) : 0;

  const summaryEl = el("statSummary");
  if(summaryEl){
    summaryEl.innerHTML = `<span class="statNum">${seen}</span>問目、<span class="statNum">${ok}</span>問正解！（<span class="statNum">${rate}</span>％）`;
  }
}

function renderSearch(keyword){
  const kw = (keyword ?? "").trim();
  const target = el("searchTarget") ? el("searchTarget").value : "q";
  const box = el("searchList");
  box.innerHTML = "";

  if(!kw){
    box.innerHTML = `<div class="muted small">検索すると一致した問題・答えがここに出ます。</div>`;
    return;
  }

  const items = state.section === "__ALL__" ? state.order.map(e=>state.data[e.section][e.index]) : (state.data[state.section] || []);
  const hit = [];

  items.forEach((it,i)=>{
    const qText = it.q || "";
    const aText = (it.a || []).join(" / ");
    const hay =
      target === "q" ? qText :
      target === "a" ? aText :
      (qText + "\n" + aText);

    if(hay.includes(kw)) hit.push({it,i});
  });

  if(hit.length===0){
    box.innerHTML = `<div class="muted small">見つかりませんでした。</div>`;
    return;
  }

  hit.slice(0,50).forEach(({it,i})=>{
    const div = document.createElement("div");
    div.className="item";
    const id = qid(state.section,i);

    const qHit = it.q.includes(kw);
    const aHit = (it.a || []).some(x => (x || "").includes(kw));
    const where =
      target === "both" ? (qHit && aHit ? "（問題＋答え）" : qHit ? "（問題）" : "（答え）") :
      target === "q" ? "（問題）" : "（答え）";

    div.innerHTML = `<b>${it.q} <span class="small muted">${where}</span></b>
      <div class="small muted">答え：${it.a[0]} ${state.mistakes.has(id) ? " / ミス済" : ""}</div>`;

    div.onclick = ()=>{
      state.reviewMode = false;
      state.order = [i];
      state.idx = -1;
      nextQuestion();
    };
    box.appendChild(div);
  });
}

function load(){
  const saved = JSON.parse(localStorage.getItem(LS_KEY) || "null");

  const savedHasCurrentData = saved && saved.data && saved.dataVersion === DATA_VERSION;
  state.data = savedHasCurrentData ? saved.data : DEFAULT_DATA;

  state.section = (saved && saved.section && state.data[saved.section]) ? saved.section : Object.keys(state.data)[0];
  state.mode = (saved && saved.mode) ? saved.mode : "flash";
  state.stats = (saved && saved.stats) ? saved.stats : {seen:0, ok:0, ng:0, streak:0};

  // データ版が違う場合は、問題IDがズレる可能性があるのでmistakesはクリア
  state.mistakes = new Set((savedHasCurrentData && saved && saved.mistakes) ? saved.mistakes : []);

  state.reviewMode = false;
  buildSectionOptions();
  el("modeSel").value = state.mode;
  el("dataArea").value = JSON.stringify(state.data, null, 2);
  makeOrder();
  renderStats();
  renderSearch("");
  nextQuestion();

  if(saved && !savedHasCurrentData){
    save();
  }

  updateNavButtons();

  // optional tests
  maybeRunTests();
}

function save(){
  localStorage.setItem(LS_KEY, JSON.stringify({
    dataVersion: DATA_VERSION,
    data: state.data,
    section: state.section,
    mode: state.mode,
    stats: state.stats,
    mistakes: Array.from(state.mistakes)
  }));
}

function applyData(){
  try{
    const parsed = JSON.parse(el("dataArea").value);
    state.data = parsed;
    const keys = Object.keys(state.data);
    if(!keys.includes(state.section)) state.section = keys[0] || "（空）";
    buildSectionOptions();
    makeOrder(false);
    state.reviewMode = false;
    save();
    nextQuestion();
    alert("反映しました！");
  }catch(e){
    alert("JSONの形式が壊れています：\n" + e.message);
  }
}

function exportData(){
  const txt = JSON.stringify(state.data, null, 2);
  navigator.clipboard?.writeText(txt).then(()=>alert("コピーしました！")).catch(()=>{
    el("dataArea").focus();
    el("dataArea").select();
    document.execCommand("copy");
    alert("コピーしました！（fallback）");
  });
}

function resetStats(){
  if(!confirm("進捗（正解/不正解/連続正解/ミス）をリセットします。よろしいですか？")) return;
  state.stats = {seen:0, ok:0, ng:0, streak:0};
  state.mistakes = new Set();
  renderStats();
  save();
}

function startReviewMistakes(){
  state.reviewMode = true;
  makeOrder(true);
  if(state.order.length===0){
    alert("この章には間違えている問題がありません。");
    state.reviewMode = false;
    makeOrder(false);
    return;
  }
  nextQuestion();
}


function wire(){
  el("sectionSel").addEventListener("change", ()=>{
    state.section = el("sectionSel").value;
    state.reviewMode = false;
    makeOrder(false);
    hideAnswer();
    renderSearch(el("searchBox").value);
    save();
    nextQuestion();
  });

  // ※changeリスナーを章変更のたびに追加すると多重登録になるので、ここで1回だけ
  el("searchTarget").addEventListener("change", ()=>renderSearch(el("searchBox").value));

  el("modeSel").addEventListener("change", ()=>{
    state.mode = el("modeSel").value;
    setModeUI();
    save();
  });

  el("btnNext").onclick = ()=>nextQuestion();
  el("btnPrev").onclick = ()=>prevQuestion();
  el("btnShow").onclick = ()=> state.revealed ? hideAnswer() : showAnswer();
    el("btnJudge").onclick = ()=>judge();
  el("btnGiveUp").onclick = ()=>giveUp();
  el("btnResetStats").onclick = ()=>resetStats();
  el("btnReviewMistakes").onclick = ()=>startReviewMistakes();
  el("searchBox").addEventListener("input", (e)=>renderSearch(e.target.value));
  el("btnApplyData").onclick = ()=>applyData();
  el("btnExportData").onclick = ()=>exportData();

  el("ansInput").addEventListener("keydown", (e)=>{
    if(e.key==="Enter"){ judge(); }
  });

  document.addEventListener("keydown", (e)=>{
    if(e.target && (e.target.tagName==="INPUT" || e.target.tagName==="TEXTAREA")) return;
    if(e.key==="n" || e.key==="N"){ nextQuestion(); }
    if(e.key==="a" || e.key==="A"){ state.revealed ? hideAnswer() : showAnswer(); }
    
  });
}

function assert(cond, msg){
  if(!cond) throw new Error("TEST FAILED: " + msg);
}

function maybeRunTests(){
  if(!location.search.includes("test=1")) return;
  console.log("[tests] start");

  // buildSectionOptions
  assert(!!el("subjectSel"), "subjectSel exists");

  // buildSectionOptions
  assert(!!el("sectionSel"), "sectionSel exists");
  assert(Object.keys(state.data).length > 0, "data has sections");
  assert(el("sectionSel").options.length === Object.keys(state.data).length + 1, "sectionSel includes 全章 option");
  assert(el("sectionSel").options[0].value === "__ALL__", "first option is 全章");

  // mode UI test
  assert(typeof setModeUI === "function", "setModeUI exists");

  // normalize
  assert(normalize(" プラザ 合意 ") === "プラザ合意", "normalize removes spaces");

  // qid
  assert(qid("S", 1) === "S::1", "qid format");

  // prevQuestion existence
  assert(typeof prevQuestion === "function", "prevQuestion exists");

  // nav buttons visibility (初期は最初の問題なので前の問題は非表示)
  assert(el("btnPrev").style.display === "none", "btnPrev hidden at start");

  // stats summary format
  const summary = el("statSummary").textContent;
  assert(summary.includes("問目"), "summary contains 問目");
  assert(summary.includes("正解"), "summary contains 正解");

  // inputモード初期では復習は非表示（最後でないため）
  state.mode = "input";
  setModeUI();
  updateNavButtons();
  assert(el("btnReviewMistakes").style.display === "none", "review hidden in input before end");

  // 入力モードでは答えを表示は非表示
  assert(el("btnShow").style.display === "none", "btnShow hidden in input mode");

  console.log("[tests] OK");
}
