<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QuiZAP</title>
  <style>
    :root{--bg:#0b1020;--card:#121a33;--muted:#a9b3d6;--text:#eef2ff;--accent:#7aa2ff;--good:#34d399;--bad:#fb7185;--warn:#fbbf24;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;background:linear-gradient(180deg,#0b1020,#070a14);color:var(--text);}
    header{padding:18px 16px;position:sticky;top:0;background:rgba(11,16,32,.75);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);z-index:10}
    h1{margin:0;font-size:18px;letter-spacing:.02em}
    .wrap{max-width:980px;margin:0 auto;padding:16px}
    .grid{display:grid;gap:12px}
    @media(min-width:900px){.grid{grid-template-columns:360px 1fr}}
    .card{background:rgba(18,26,51,.9);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.25)}

    /* 右側カードを縦レイアウトにしてボタンを下固定 */
    .card.flexcol{display:flex;flex-direction:column;}
    .bottomBar{margin-top:auto;padding-top:12px;background:linear-gradient(to top, rgba(18,26,51,1), rgba(18,26,51,.95) 60%, rgba(18,26,51,0));position:sticky;bottom:0;}

    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    select,input,button,textarea{font:inherit}
    select,input,textarea{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(7,10,20,.8);color:var(--text);outline:none}

    /* 出題科目ドロップダウン内の文字を太字 */
    #subjectSel{font-weight:700;}
    #subjectSel option{font-weight:700;}

    textarea{min-height:120px;resize:vertical}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row > *{flex:1}
    button{padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(122,162,255,.18);color:var(--text);cursor:pointer}
    button:hover{background:rgba(122,162,255,.28)}
    button.primary{background:rgba(122,162,255,.35)}
    button.good{background:rgba(52,211,153,.18)}
    button.bad{background:rgba(251,113,133,.18)}
    button.warn{background:rgba(251,191,36,.16)}
    .pill{display:inline-flex;gap:8px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);font-size:12px;color:var(--muted)}

    .q{font-size:18px;line-height:1.5;margin:6px 0 10px}

    /* 選択肢行（ア：/イ：/ウ：...）を小さく＆間隔を詰める */
    .choiceLine{font-size:0.75em;display:block;margin:0;line-height:1.1}

    .a{padding:10px 12px;border-radius:12px;border:1px dashed rgba(255,255,255,.18);background:rgba(255,255,255,.04)}
    .muted{color:var(--muted)}
    .ok{color:var(--good)}
    .ng{color:var(--bad)}
    .small{font-size:12px}

    /* 難易度表示は白色にする */
    #diffLine{color:var(--text);}

    .sep{height:1px;background:rgba(255,255,255,.08);margin:12px 0}
    .list{max-height:300px;overflow:auto;padding-right:6px}
    .item{padding:10px 10px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);margin-bottom:8px;cursor:pointer}
    .item:hover{background:rgba(255,255,255,.06)}
    .item b{display:block}
    .statNum{font-size:1.5em;font-weight:600;}
  </style>
</head>
<body>
<header>
  <div class="wrap row" style="align-items:center;justify-content:space-between">
    <h1>QuiZAP</h1>
  </div>
</header>

<div class="wrap grid">
  <section class="card">
    <div>
      <label style="font-weight:700;">出題科目</label>
      <select id="subjectSel">
        <option value="公共">公共</option>
        <option value="保健">保健</option>
      </select>
    </div>

    <div style="margin-top:10px">
      <label>出題モード</label>
      <select id="modeSel">
        <option value="flash">暗記カード（答え表示中心）</option>
        <option value="input">入力クイズ（正誤判定）</option>
      </select>
    </div>

    <div style="margin-top:10px">
      <label>出題する章</label>
      <select id="sectionSel"></select>
    </div>

    <div class="sep"></div>

    <label>検索</label>
    <div class="row">
      <select id="searchTarget">
        <option value="q">問題（問題文）</option>
        <option value="a">答え</option>
        <option value="both">問題＋答え</option>
      </select>
      <input id="searchBox" placeholder="例：プラザ / 公害 / NATO など" />
    </div>
    <div class="list" id="searchList" style="margin-top:10px"></div>

    <div class="sep"></div>

    <details>
      <summary class="muted">データの編集（JSON・管理用）</summary>
      <p class="small muted">問題・答えに誤りがある場合は、ここで修正できます。※デバイス内に保存されます。※オンライン上では更新されないため、間違いを発見した際は、LINEにてご報告をお願いします。</p>
      <textarea id="dataArea"></textarea>
      <div class="row" style="margin-top:10px">
        <button id="btnApplyData" class="good">反映</button>
        <button id="btnExportData">JSONをコピー</button>
      </div>
      <p class="small muted">※入力を間違えて戻せなくなった際は、ページ再読み込みで元に戻せます（保存済みの進捗は残ります）。</p>
    </details>

    <div class="row" style="margin-top:10px">
      <button id="btnResetStats">進捗リセット</button>
    </div>
  </section>

  <section class="card flexcol">
    <div class="pill" id="metaPill">—</div>

    <!-- 統計を問題の上へ移動（入力クイズのみ表示） -->
    <div class="sep" id="sepStatsTop"></div>
    <div class="row" id="statsRow">
      <div class="pill"><span id="statSummary"><span class="statNum">0</span>問目、<span class="statNum">0</span>問正解！（<span class="statNum">0</span>％）</span></div>
    </div>
    <div class="sep" id="sepStatsBottom"></div>

    <div class="q" id="qText">章を選んで「次の問題」</div>
    <div class="small muted" id="diffLine"></div>

    <div id="inputArea" style="display:none">
      <label>あなたの答え（例：プラザ合意）</label>
      <input id="ansInput" autocomplete="off" placeholder="ここに入力" />
      <div class="row" style="margin-top:10px">
        <button id="btnJudge" class="primary">正誤判定</button>
        <button id="btnGiveUp" class="bad">わからない</button>
      </div>
      <p class="small muted">一部問題や文章で答える問題には別解があります。文章で答える問題の場合、正しい答えを入力しても正解とならない場合があります。</p>
    </div>

    <!-- 暗記カード用：問題の下に表示する答えボタン -->
    <div id="flashShowWrap" style="margin-top:10px">
      <button id="btnShow">▼ 答えを表示</button>
    </div>

    <!-- 答えはボタンの下に表示 -->
    <div style="margin-top:10px;display:none" id="answerBox" class="a"></div>

    <div style="margin-top:10px" class="small muted" id="hintLine"></div>

    <!-- 下固定ボタンエリア -->
    <div class="bottomBar">
      <div class="row" style="margin-top:10px">
        <button id="btnPrev">← 前の問題</button>
        <button id="btnReviewMistakes" class="bad">復習する →</button>
        <button class="primary" id="btnNext">次の問題 →</button>
      </div>
    </div>
  </section>
</div>

// 問題データをHTML側で更新しても、localStorageに古いdataが残っていると反映されないため、版（バージョン）を持たせて不一致ならDEFAULT_DATAを採用する
const DATA_VERSION = 4;

const state = {
  subject: "公共",
  dataBySubject: null,
  statsBySubject: null,
  mistakesBySubject: null,
  sectionBySubject: null,

  data: null,
  section: null,
  mode: "flash",
  order: [], // [{section, index}, ...]
  idx: -1,
  current: null,
  revealed: false,
  stats: {seen:0, ok:0, ng:0, streak:0},
  mistakes: new Set(),
  reviewMode: false
};

const el = (id)=>document.getElementById(id);

function normalize(s){
  return (s??"")
    .toString()
    .trim()
    .replace(/\s+/g,"")
    .replace(/[‐-‒–—―ー]/g,"-")
    .replace(/[・]/g,"･")
    .replace(/[（）()]/g,"");
}

function qid(section, i){ return section + "::" + i; }

function escapeHTML(str){
  return (str??"").toString()
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/\"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

// 選択肢行（ア：/イ：/ウ：...）が同一行に並んでいる場合も分割
function splitChoiceRun(line){
  const s = (line??"").trim();
  if(!/^[ア-ン]：/.test(s)) return [s];
  const parts = s.split(/(?=[ア-ン]：)/g).map(x=>x.trim()).filter(Boolean);
  return parts.length ? parts : [s];
}

function formatQuestionHTML(rawQ){
  // ここは「SyntaxErrorを起こさない」ことを最優先にして、
  // 正規表現リテラルが行途中で壊れないよう “必ず1行の式” で完結させる。
  // - \r\n / \r を \n に統一
  // - 文字として入っている "\\n"（バックスラッシュ+n）も実改行へ
  const q = (rawQ ?? "").toString()
    .replace(/\r\n/g, "\n")
    .replace(/\r/g, "\n")
    .replace(/\\n/g, "\n");

  const lines = q.split("\n");
  const out = [];
  if(lines.length === 0) return "";

  // 1行目：本文
  out.push(escapeHTML(lines[0]));

  // 2行目以降：選択肢・補足（必ず改行して表示）
  for(let i=1;i<lines.length;i++){
    const l = lines[i];
    const chunks = splitChoiceRun(l);
    for(const chunk of chunks){
      const t = (chunk ?? "").trim();
      if(!t) continue;
      if(/^[ア-ン]：/.test(t)){
        out.push(`<br><span class="choiceLine">${escapeHTML(t)}</span>`);
      }else{
        out.push(`<br>${escapeHTML(t)}`);
      }
    }
  }

  return out.join("");
}

function buildSectionOptions(){
  const sel = el("sectionSel");
  if(!sel) return;
  sel.innerHTML = "";

  const allOpt = document.createElement("option");
  allOpt.value = "__ALL__";
  allOpt.textContent = "全章";
  sel.appendChild(allOpt);

  const keys = Object.keys(state.data || {});
  keys.forEach(name=>{
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });

  if(state.section === "__ALL__"){
    sel.value = "__ALL__";
  }else if(keys.includes(state.section)){
    sel.value = state.section;
  }else{
    state.section = "__ALL__";
    sel.value = "__ALL__";
  }
}

function makeOrder(fromMistakes=false){
  let pool = [];

  if(state.section === "__ALL__"){
    Object.keys(state.data).forEach(sec=>{
      (state.data[sec] || []).forEach((_,i)=>{
        pool.push({section:sec, index:i});
      });
    });
  }else{
    (state.data[state.section] || []).forEach((_,i)=>{
      pool.push({section:state.section, index:i});
    });
  }

  if(fromMistakes){
    pool = pool.filter(p=> state.mistakes.has(qid(p.section,p.index)));
  }

  // shuffle (常にシャッフル状態)
  for(let i=pool.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }

  state.order = pool;
  state.idx = -1;
  updateNavButtons();
}

function currentItem(){
  const entry = state.order[state.idx];
  if(!entry) return null;

  const items = state.data[entry.section] || [];
  const it = items[entry.index];
  if(!it) return null;

  return { ...it, _i:entry.index, _section:entry.section, _id: qid(entry.section,entry.index) };
}

function updateNavButtons(){
  const btnPrev = el("btnPrev");
  const btnNext = el("btnNext");
  const btnReview = el("btnReviewMistakes");

  const total = state.order.length;
  const atStart = state.idx <= 0;
  const atEnd = total === 0 ? true : state.idx >= total - 1;

  if(btnPrev) btnPrev.style.display = atStart ? "none" : "inline-block";
  if(btnNext) btnNext.style.display = atEnd ? "none" : "inline-block";

  if(btnReview){
    if(state.mode === "input" && atEnd && total > 0){
      btnReview.style.display = "inline-block";
    }else if(state.mode === "input"){
      btnReview.style.display = "none";
    }
  }
}

function setModeUI(){
  const isInput = state.mode === "input";

  const statsRow = el("statsRow");
  const sepTop = el("sepStatsTop");
  const sepBottom = el("sepStatsBottom");

  if(statsRow){
    const show = isInput;
    statsRow.style.display = show ? "flex" : "none";
    if(sepTop) sepTop.style.display = show ? "block" : "none";
    if(sepBottom) sepBottom.style.display = show ? "block" : "none";
  }

  const btnShow = el("btnShow");
  const btnReview = el("btnReviewMistakes");
  const btnReset = el("btnResetStats");

  if(state.mode === "flash"){
    if(btnShow) btnShow.style.display = "inline-block";
    if(btnReview) btnReview.style.display = "none";
    if(btnReset) btnReset.style.display = "none";
  }else{
    if(btnShow) btnShow.style.display = "none";
    if(btnReset) btnReset.style.display = "inline-block";
  }

  el("inputArea").style.display = isInput ? "block" : "none";
  el("ansInput").value = "";
  el("hintLine").textContent = isInput
    ? "Enterでも判定します / わからなければ「わからない」をクリック・タップ"
    : "";
}

function showAnswer(){
  if(!state.current) return;
  state.revealed = true;
  el("answerBox").style.display = "block";
  el("answerBox").innerHTML =
    `<div class="muted small">答え</div>
     <div style="font-size:18px;margin-top:4px"><b>${escapeHTML(state.current.a[0])}</b></div>
     ${state.current.a.length>1 ? `<div class="muted small" style="margin-top:6px">別解：${state.current.a.slice(1).map(escapeHTML).join(" / ")}</div>` : ""}`;
}

function hideAnswer(){
  state.revealed = false;
  el("answerBox").style.display = "none";
  el("answerBox").textContent = "";
}

function renderCurrent(){
  const total = state.order.length;
  const pos = total ? (state.idx + 1) : 0;
  const label = state.section === "__ALL__" ? "全章" : state.section;

  el("metaPill").textContent = `選択中：${label} - ${pos} / ${total}${state.reviewMode ? "（間違い復習）" : ""}`;

  el("qText").innerHTML = formatQuestionHTML(state.current?.q || "");

  const dl = el("diffLine");
  if(dl) dl.textContent = state.current?.d ? `難易度：${state.current.d}` : "";

  updateNavButtons();
}

function nextQuestion(){
  if(state.order.length === 0){
    el("qText").textContent = "この章に問題がありません。";
    const dl = el("diffLine");
    if(dl) dl.textContent = "";
    const label0 = state.section === "__ALL__" ? "全章" : state.section;
    el("metaPill").textContent = `選択中：${label0} - 0 / 0${state.reviewMode ? "（間違い復習）" : ""}`;
    hideAnswer();
    setModeUI();
    state.idx = 0;
    updateNavButtons();
    return;
  }

  if(state.idx < state.order.length - 1){
    state.idx += 1;
  }else{
    state.idx = state.order.length - 1;
  }

  state.current = currentItem();
  state.revealed = false;
  hideAnswer();
  setModeUI();
  renderCurrent();
  el("ansInput").focus();
}

function prevQuestion(){
  if(state.order.length === 0) return;
  if(state.idx <= 0){
    state.idx = 0;
  }else{
    state.idx -= 1;
  }

  state.current = currentItem();
  state.revealed = false;
  hideAnswer();
  setModeUI();
  renderCurrent();
}

function judge(){
  if(!state.current) return;
  const user = normalize(el("ansInput").value);
  const answers = (state.current.a || []).map(normalize);
  const ok = answers.includes(user);

  state.stats.seen += 1;
  if(ok){
    state.stats.ok += 1;
    state.stats.streak += 1;
    state.mistakes.delete(state.current._id);
    el("hintLine").innerHTML = `<span class="ok"><b>○ 正解！</b></span>　次へどうぞ。`;
  }else{
    state.stats.ng += 1;
    state.stats.streak = 0;
    state.mistakes.add(state.current._id);
    el("hintLine").innerHTML = `<span class="ng"><b>× ちがう</b></span>　答えを表示します。`;
    showAnswer();
  }
  renderStats();
  save();
  updateNavButtons();
}

function giveUp(){
  if(!state.current) return;
  state.stats.seen += 1;
  state.stats.ng += 1;
  state.stats.streak = 0;
  state.mistakes.add(state.current._id);
  renderStats();
  showAnswer();
  el("hintLine").innerHTML = `<span class="ng"><b>×</b></span>　復習リストに入れました。`;
  save();
  updateNavButtons();
}

function renderStats(){
  const {seen, ok} = state.stats;
  const rate = seen ? Math.round(ok/seen*100) : 0;

  const summaryEl = el("statSummary");
  if(summaryEl){
    summaryEl.innerHTML = `<span class="statNum">${seen}</span>問目、<span class="statNum">${ok}</span>問正解！（<span class="statNum">${rate}</span>％）`;
  }
}

function renderSearch(keyword){
  const kw = (keyword ?? "").trim();
  const target = el("searchTarget") ? el("searchTarget").value : "q";
  const box = el("searchList");
  box.innerHTML = "";

  if(!kw){
    box.innerHTML = `<div class="muted small">検索すると一致した問題・答えがここに出ます。</div>`;
    return;
  }

  const pool = [];
  if(state.section === "__ALL__"){
    Object.keys(state.data).forEach(sec=>{
      (state.data[sec] || []).forEach((it, idx)=>pool.push({it, section:sec, index:idx}));
    });
  }else{
    (state.data[state.section] || []).forEach((it, idx)=>pool.push({it, section:state.section, index:idx}));
  }

  const hit = [];
  pool.forEach(({it, section, index})=>{
    const qText = it.q || "";
    const aText = (it.a || []).join(" / ");
    const hay =
      target === "q" ? qText :
      target === "a" ? aText :
      (qText + "\n" + aText);

    if(hay.includes(kw)) hit.push({it, section, index});
  });

  if(hit.length===0){
    box.innerHTML = `<div class="muted small">見つかりませんでした。</div>`;
    return;
  }

  hit.slice(0,50).forEach(({it, section, index})=>{
    const div = document.createElement("div");
    div.className="item";
    const id = qid(section, index);

    const qHit = (it.q || "").includes(kw);
    const aHit = (it.a || []).some(x => (x || "").includes(kw));
    const where =
      target === "both" ? (qHit && aHit ? "（問題＋答え）" : qHit ? "（問題）" : "（答え）") :
      target === "q" ? "（問題）" : "（答え）";

    div.innerHTML =
      `<b>${escapeHTML(it.q || "")} <span class="small muted">${where}</span></b>` +
      `<div class="small muted">答え：${escapeHTML((it.a||[])[0] || "")} ${state.mistakes.has(id) ? " / ミス済" : ""}</div>` +
      (it.d ? `<div class="small muted">難易度：${escapeHTML(it.d)}</div>` : "");

    div.onclick = ()=>{
      state.reviewMode = false;
      state.order = [{section, index}];
      state.idx = -1;
      nextQuestion();
    };

    box.appendChild(div);
  });
}

function load(){
  const saved = JSON.parse(localStorage.getItem(LS_KEY) || "null");

  const baseDataBySubject = {
    "公共": SUBJECT_DEFAULTS["公共"],
    "保健": SUBJECT_DEFAULTS["保健"],
  };

  const hasCurrent = saved && saved.dataVersion === DATA_VERSION;

  // saved側に古いデータが残っていると、新しく追加した章が消えることがある。
  // そこで「章キー単位」で base と saved をマージし、
  // saved の編集内容は尊重しつつ、base にしかない新章も必ず取り込む。
  const mergedDataBySubject = {};
  Object.keys(baseDataBySubject).forEach(subj=>{
    const base = baseDataBySubject[subj] || {};
    const savedSubj = (hasCurrent && saved.dataBySubject && saved.dataBySubject[subj]) ? saved.dataBySubject[subj] : null;
    mergedDataBySubject[subj] = savedSubj ? ({ ...base, ...savedSubj }) : base;
  });

  state.dataBySubject = mergedDataBySubject;
  state.statsBySubject = hasCurrent && saved.statsBySubject ? saved.statsBySubject : {};
  state.mistakesBySubject = hasCurrent && saved.mistakesBySubject ? saved.mistakesBySubject : {};
  state.sectionBySubject = hasCurrent && saved.sectionBySubject ? saved.sectionBySubject : {};

  state.subject = (hasCurrent && saved.subject && state.dataBySubject[saved.subject]) ? saved.subject : "公共";
  el("subjectSel").value = state.subject;

  state.data = state.dataBySubject[state.subject];
  state.section = state.sectionBySubject[state.subject] || "__ALL__";
  state.mode = (saved && saved.mode) ? saved.mode : "flash";

  state.stats = state.statsBySubject[state.subject] || {seen:0, ok:0, ng:0, streak:0};
  state.mistakes = new Set(state.mistakesBySubject[state.subject] || []);

  state.reviewMode = false;
  buildSectionOptions();
  el("modeSel").value = state.mode;
  el("dataArea").value = JSON.stringify(state.data, null, 2);

  makeOrder(false);
  renderStats();
  renderSearch("");
  nextQuestion();

  save();
  updateNavButtons();
  setModeUI();
  maybeRunTests();
}

function save(){
  state.dataBySubject[state.subject] = state.data;
  state.statsBySubject[state.subject] = state.stats;
  state.mistakesBySubject[state.subject] = Array.from(state.mistakes);
  state.sectionBySubject[state.subject] = state.section;

  localStorage.setItem(LS_KEY, JSON.stringify({
    dataVersion: DATA_VERSION,
    subject: state.subject,
    dataBySubject: state.dataBySubject,
    statsBySubject: state.statsBySubject,
    mistakesBySubject: state.mistakesBySubject,
    sectionBySubject: state.sectionBySubject,
    mode: state.mode
  }));
}

function applyData(){
  try{
    const parsed = JSON.parse(el("dataArea").value);
    state.data = parsed;
    state.dataBySubject[state.subject] = state.data;

    const keys = Object.keys(state.data);
    if(state.section !== "__ALL__" && !keys.includes(state.section)) state.section = "__ALL__";

    buildSectionOptions();
    makeOrder(false);
    state.reviewMode = false;
    save();
    nextQuestion();
    alert("反映しました！");
  }catch(e){
    alert("JSONの形式が壊れています：\n" + e.message);
  }
}

function exportData(){
  const txt = JSON.stringify(state.data, null, 2);
  navigator.clipboard?.writeText(txt).then(()=>alert("コピーしました！")).catch(()=>{
    el("dataArea").focus();
    el("dataArea").select();
    document.execCommand("copy");
    alert("コピーしました！（fallback）");
  });
}

function resetStats(){
  // 期待動作：この科目の「出題数/正解数/正解率/連続正解」と「ミス記録」をすべて0/空に戻す
  if(!confirm("進捗（正解/不正解/連続正解/ミス）をリセットします。よろしいですか？")) return;

  state.stats = {seen:0, ok:0, ng:0, streak:0};
  state.mistakes = new Set();
  state.reviewMode = false;

  // 画面反映
  renderStats();
  hideAnswer();
  el("hintLine").textContent = "";

  // 出題順を作り直して最初の問題へ
  makeOrder(false);
  state.idx = -1;
  nextQuestion();

  // 科目単位で保存
  state.statsBySubject[state.subject] = state.stats;
  state.mistakesBySubject[state.subject] = [];

  save();
  updateNavButtons();
}

function startReviewMistakes(){
  state.reviewMode = true;
  makeOrder(true);
  if(state.order.length===0){
    alert("この章には間違えている問題がありません。");
    state.reviewMode = false;
    makeOrder(false);
    return;
  }
  nextQuestion();
}

function wire(){
  el("sectionSel").addEventListener("change", ()=>{
    state.section = el("sectionSel").value;
    state.reviewMode = false;
    makeOrder(false);
    hideAnswer();
    renderSearch(el("searchBox").value);
    save();
    nextQuestion();
  });

  el("searchTarget").addEventListener("change", ()=>renderSearch(el("searchBox").value));

  el("modeSel").addEventListener("change", ()=>{
    state.mode = el("modeSel").value;
    setModeUI();
    updateNavButtons();
    save();
  });

  el("btnNext").onclick = ()=>nextQuestion();
  el("btnPrev").onclick = ()=>prevQuestion();
  el("btnShow").onclick = ()=> state.revealed ? hideAnswer() : showAnswer();
  el("btnJudge").onclick = ()=>judge();
  el("btnGiveUp").onclick = ()=>giveUp();
  el("btnResetStats").onclick = ()=>resetStats();
  el("btnReviewMistakes").onclick = ()=>startReviewMistakes();
  el("searchBox").addEventListener("input", (e)=>renderSearch(e.target.value));
  el("btnApplyData").onclick = ()=>applyData();
  el("btnExportData").onclick = ()=>exportData();

  // 科目切替
  el("subjectSel").addEventListener("change", ()=>{
    save();

    state.subject = el("subjectSel").value;
    state.data = state.dataBySubject[state.subject] || SUBJECT_DEFAULTS[state.subject] || {};
    state.section = state.sectionBySubject[state.subject] || "__ALL__";
    state.stats = state.statsBySubject[state.subject] || {seen:0, ok:0, ng:0, streak:0};
    state.mistakes = new Set(state.mistakesBySubject[state.subject] || []);

    state.reviewMode = false;
    buildSectionOptions();
    el("dataArea").value = JSON.stringify(state.data, null, 2);

    makeOrder(false);
    renderStats();
    renderSearch("");
    nextQuestion();
    setModeUI();
    updateNavButtons();
    save();
  });

  el("ansInput").addEventListener("keydown", (e)=>{
    if(e.key === "Enter"){ judge(); }
  });
}

// -------------------------
// テスト（?test=1 で実行）
// -------------------------
function assert(cond, msg){
  if(!cond) throw new Error("TEST FAILED: " + msg);
}

function maybeRunTests(){
  if(!location.search.includes("test=1")) return;
  console.log("[tests] start");

  assert(!!el("subjectSel"), "subjectSel exists");
  assert(!!el("sectionSel"), "sectionSel exists");
  assert(!!el("qText"), "qText exists");

  assert(!!SUBJECT_DEFAULTS["公共"], "has 公共");
  assert(!!SUBJECT_DEFAULTS["保健"], "has 保健");

  assert(Array.isArray(HEALTH_DATA["9 喫煙と健康"]) && HEALTH_DATA["9 喫煙と健康"].length > 0, "health chapter 9 exists");
  assert(Array.isArray(HEALTH_DATA["10 飲酒と健康"]) && HEALTH_DATA["10 飲酒と健康"].length > 0, "health chapter 10 exists");

  // 問題文の改行が扱える（実改行）
  assert(HEALTH_DATA["9 喫煙と健康"][7].q.includes("\\n"), "health multiline uses \\n in data string");

  // chapter10 選択問題の答えが配列になっているか
  assert(Array.isArray(HEALTH_DATA["10 飲酒と健康"][5].a), "chapter10 choice answer is array");

  // 文字としての "\\n" も正しく扱える（ダミー文字列で確認）
  const dummyLiteral = "本文\\nア：A\\nイ：B\\nウ：C";
  const htmlLit = formatQuestionHTML(dummyLiteral);
  assert(htmlLit.includes("choiceLine"), "formatter adds choiceLine for literal \\n");

  // 実改行でも OK
  const dummyReal = "本文\nア：A\nイ：B\nウ：C";
  const htmlReal = formatQuestionHTML(dummyReal);
  assert(htmlReal.includes("choiceLine"), "formatter adds choiceLine for real newline");

  // フォーマッタが選択肢を choiceLine にする
  const html = formatQuestionHTML(HEALTH_DATA["9 喫煙と健康"][7].q);
  assert(html.includes("choiceLine"), "formatter adds choiceLine");
  assert(html.includes("ア："), "formatter keeps choices");

  // 全章で order が作れる
  state.subject = "公共";
  state.data = SUBJECT_DEFAULTS["公共"];
  state.section = "__ALL__";
  makeOrder(false);
  assert(Array.isArray(state.order) && state.order.length > 0, "order built for __ALL__");

  console.log("[tests] OK");
}

wire();
load();
</script>
